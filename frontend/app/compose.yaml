# Docker Compose reference: https://docs.docker.com/go/compose-spec-reference/

services:
  web:
    # image: names the built image so it can be pushed to a registry later.
    # Without this Docker assigns a random hash that changes every build.
    image: antifragile-web:latest

    build:
      # context: the directory Docker sends to the daemon as the build context.
      context: .
      # dockerfile: explicit path — avoids ambiguity if multiple Dockerfiles exist.
      dockerfile: Dockerfile
      # Pass NEXT_PUBLIC_ vars as build args so Next.js can inline them
      # into the client bundle during `next build`.
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}

    # restart: unless-stopped — restarts after crashes or host reboots,
    # but respects an intentional "docker compose stop".
    restart: unless-stopped

    # Load non-secret runtime variables from a file.
    # .env is the production file; .env.local is for local dev only
    # and is typically gitignored, so it won't exist in CI/production.
    env_file:
      - .env

    environment:
      NODE_ENV: production

    ports:
      # HOST_PORT:CONTAINER_PORT
      # Only bind to 127.0.0.1 if you have a reverse proxy (nginx/Caddy)
      # in front. Use 0.0.0.0 (default) to expose directly.
      - "3000:3000"

    # healthcheck mirrors what the Dockerfile declares so Compose can
    # gate dependent services on actual readiness, not just process start.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

    # deploy.resources — prevent a runaway process from consuming all host RAM.
    # Adjust limits to match your server's available resources.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
